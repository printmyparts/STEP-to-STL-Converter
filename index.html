<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEP to STL Converter - Diagnostic Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }

        .diagnostic-log {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-success {
            color: #388e3c;
        }

        .log-error {
            color: #d32f2f;
            font-weight: bold;
        }

        .log-info {
            color: #1976d2;
        }

        .log-warning {
            color: #f57c00;
        }

        .test-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .test-button {
            flex: 1;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .test-button:hover {
            background: #764ba2;
        }

        .test-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Converter Diagnostic Tool</h1>
        
        <div class="diagnostic-log" id="diagnosticLog">
            <div class="log-entry log-info">Diagnostic tool started...</div>
        </div>

        <div class="test-buttons">
            <button class="test-button" id="testCDN">Test CDN Access</button>
            <button class="test-button" id="testLoad">Test Library Load</button>
            <button class="test-button" id="clearLog">Clear Log</button>
        </div>
    </div>

    <script>
    var DiagnosticTool = (function() {
        var logDiv = document.getElementById('diagnosticLog');
        var testCDNBtn = document.getElementById('testCDN');
        var testLoadBtn = document.getElementById('testLoad');
        var clearLogBtn = document.getElementById('clearLog');

        function log(message, type) {
            type = type || 'info';
            var timestamp = new Date().toLocaleTimeString();
            var entry = document.createElement('div');
            entry.className = 'log-entry log-' + type;
            entry.textContent = '[' + timestamp + '] ' + message;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function testCDNAccess() {
            log('Testing CDN accessibility...', 'info');
            testCDNBtn.disabled = true;

            var urls = [
                'https://unpkg.com/opencascade.js@1.1.1/dist/opencascade.wasm.js',
                'https://unpkg.com/opencascade.js@1.1.1/dist/opencascade.wasm.wasm'
            ];

            var completed = 0;
            urls.forEach(function(url) {
                fetch(url, { method: 'HEAD' })
                    .then(function(response) {
                        if (response.ok) {
                            log('✓ Accessible: ' + url.split('/').pop(), 'success');
                        } else {
                            log('✗ Failed (' + response.status + '): ' + url.split('/').pop(), 'error');
                        }
                        completed++;
                        if (completed === urls.length) {
                            testCDNBtn.disabled = false;
                        }
                    })
                    .catch(function(error) {
                        log('✗ Network error: ' + url.split('/').pop() + ' - ' + error.message, 'error');
                        completed++;
                        if (completed === urls.length) {
                            testCDNBtn.disabled = false;
                        }
                    });
            });
        }

        function testLibraryLoad() {
            log('Attempting to load OpenCascade.js...', 'info');
            testLoadBtn.disabled = true;

            // Check if already loaded
            if (typeof opencascade !== 'undefined') {
                log('⚠ Library already loaded! Reinitializing...', 'warning');
            }

            var script = document.createElement('script');
            script.src = 'https://unpkg.com/opencascade.js@1.1.1/dist/opencascade.wasm.js';
            
            var startTime = Date.now();
            
            script.onload = function() {
                var loadTime = Date.now() - startTime;
                log('✓ Script loaded in ' + loadTime + 'ms', 'success');
                
                log('Checking for opencascade global...', 'info');
                var checkCount = 0;
                var maxChecks = 50; // 5 seconds
                
                var checkInterval = setInterval(function() {
                    checkCount++;
                    
                    if (typeof opencascade !== 'undefined') {
                        clearInterval(checkInterval);
                        log('✓ opencascade global found after ' + (checkCount * 100) + 'ms', 'success');
                        log('Initializing WASM module...', 'info');
                        
                        var initStart = Date.now();
                        opencascade({
                            locateFile: function(path) {
                                var fullPath = 'https://unpkg.com/opencascade.js@1.1.1/dist/' + path;
                                log('Loading: ' + path, 'info');
                                return fullPath;
                            }
                        }).then(function(oc) {
                            var initTime = Date.now() - initStart;
                            log('✓ WASM initialized in ' + initTime + 'ms', 'success');
                            log('✓ OpenCascade.js is ready!', 'success');
                            log('Available classes: ' + Object.keys(oc).length, 'info');
                            testLoadBtn.disabled = false;
                        }).catch(function(error) {
                            log('✗ WASM initialization failed: ' + error.message, 'error');
                            log('Error details: ' + JSON.stringify(error), 'error');
                            testLoadBtn.disabled = false;
                        });
                    } else if (checkCount >= maxChecks) {
                        clearInterval(checkInterval);
                        log('✗ opencascade global not found after ' + (maxChecks * 100) + 'ms', 'error');
                        log('This usually means the script failed to execute properly', 'error');
                        testLoadBtn.disabled = false;
                    }
                }, 100);
            };
            
            script.onerror = function(e) {
                log('✗ Script load failed!', 'error');
                log('Possible causes: Network blocked, CORS issue, or CDN down', 'error');
                testLoadBtn.disabled = false;
            };
            
            document.head.appendChild(script);
        }

        clearLogBtn.addEventListener('click', function() {
            logDiv.innerHTML = '<div class="log-entry log-info">Log cleared...</div>';
        });

        testCDNBtn.addEventListener('click', testCDNAccess);
        testLoadBtn.addEventListener('click', testLibraryLoad);

        // Auto-run tests on load
        log('Browser: ' + navigator.userAgent, 'info');
        log('Running automatic diagnostics...', 'info');
        
        setTimeout(function() {
            testCDNAccess();
        }, 500);

        setTimeout(function() {
            testLibraryLoad();
        }, 2000);

        return {
            log: log
        };
    })();
    </script>
</body>
</html>
