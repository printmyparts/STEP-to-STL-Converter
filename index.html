<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online STEP to STL converter. Convert CAD files directly in your browser with no upload required.">
    <title>STEP to STL Converter - Free Online CAD File Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        .quality-selector {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .quality-selector label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .quality-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quality-option {
            flex: 1;
            min-width: 120px;
        }

        .quality-option input[type="radio"] {
            display: none;
        }

        .quality-option label {
            display: block;
            padding: 12px 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            font-size: 13px;
        }

        .quality-option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .quality-option label:hover {
            border-color: #667eea;
        }

        .quality-description {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            font-weight: 400;
        }

        .quality-option input[type="radio"]:checked + label .quality-description {
            color: rgba(255, 255, 255, 0.9);
        }

        .status {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            display: block;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            display: block;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
            display: block;
        }

        .status.loading {
            background: #fff3e0;
            color: #f57c00;
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .download-btn {
            display: none;
            margin-top: 20px;
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .download-btn.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f57c00;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .file-info {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            display: none;
        }

        .file-info.active {
            display: block;
        }

        .file-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .file-info-item:last-child {
            margin-bottom: 0;
        }

        .file-info-label {
            color: #666;
            font-weight: 500;
        }

        .file-info-value {
            color: #333;
            font-weight: 600;
        }

        .loading-text {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .quality-options {
                flex-direction: column;
            }

            .quality-option {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>STEP to STL Converter</h1>
        <p class="subtitle">Convert your STEP files to STL format directly in your browser - Free & Private</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload or drag & drop</div>
            <div class="upload-hint">Supports .step and .stp files</div>
            <input type="file" id="fileInput" accept=".step,.stp">
        </div>

        <div class="quality-selector">
            <label>Conversion Quality:</label>
            <div class="quality-options">
                <div class="quality-option">
                    <input type="radio" name="quality" id="quality-low" value="0.5" data-max-size="50">
                    <label for="quality-low">
                        Low
                        <div class="quality-description">Max 50 MB</div>
                    </label>
                </div>
                <div class="quality-option">
                    <input type="radio" name="quality" id="quality-medium" value="0.1" data-max-size="20" checked>
                    <label for="quality-medium">
                        Medium
                        <div class="quality-description">Max 20 MB</div>
                    </label>
                </div>
                <div class="quality-option">
                    <input type="radio" name="quality" id="quality-high" value="0.01" data-max-size="10">
                    <label for="quality-high">
                        High
                        <div class="quality-description">Max 10 MB</div>
                    </label>
                </div>
            </div>
        </div>

        <div class="file-info" id="fileInfo"></div>

        <div class="status" id="status"></div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <button class="download-btn" id="downloadBtn">Download STL File</button>

        <div class="footer">
            🔒 All conversions happen locally in your browser. Your files never leave your device.
        </div>
    </div>

    <script src="https://unpkg.com/opencascade.js@1.1.1/dist/opencascade.wasm.js"></script>
    <script>
    (function() {
        let oc = null;
        let stlBlob = null;
        let originalFilename = '';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const downloadBtn = document.getElementById('downloadBtn');
        const fileInfo = document.getElementById('fileInfo');

        // Initialize OpenCascade on page load
        async function initializeConverter() {
            try {
                updateStatus('loading', 'Initializing CAD engine... This may take a moment on first load.');
                setProgress(30);
                
                oc = await opencascade({
                    locateFile(path) {
                        return 'https://unpkg.com/opencascade.js@1.1.1/dist/' + path;
                    }
                });
                
                setProgress(100);
                updateStatus('info', 'Ready! Upload a STEP file to get started.');
                setTimeout(() => hideProgress(), 500);
            } catch (error) {
                console.error('Failed to initialize OpenCascade:', error);
                updateStatus('error', 'Failed to initialize converter. Please refresh the page.');
            }
        }

        // Upload area click
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // Download button
        downloadBtn.addEventListener('click', () => {
            if (stlBlob) {
                const url = URL.createObjectURL(stlBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = originalFilename.replace(/\.(step|stp)$/i, '.stl');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        });

        async function handleFile(file) {
            if (!oc) {
                updateStatus('error', 'Converter not ready yet. Please wait...');
                return;
            }

            const validExtensions = ['.step', '.stp'];
            const fileExtension = file.name.toLowerCase().match(/\.[^.]+$/)?.[0];
            
            if (!validExtensions.includes(fileExtension)) {
                updateStatus('error', 'Invalid file type. Please upload a .step or .stp file.');
                return;
            }

            // Check file size against selected quality limit
            const selectedQuality = document.querySelector('input[name="quality"]:checked');
            const maxSizeMB = parseInt(selectedQuality.dataset.maxSize);
            const fileSizeMB = file.size / 1024 / 1024;

            if (fileSizeMB > maxSizeMB) {
                updateStatus('error', `File too large for selected quality. Maximum ${maxSizeMB} MB allowed. Your file is ${fileSizeMB.toFixed(2)} MB. Please select a lower quality setting or use a smaller file.`);
                return;
            }

            originalFilename = file.name;
            
            // Show file info
            displayFileInfo(file);

            // Reset UI
            downloadBtn.classList.remove('active');
            stlBlob = null;

            try {
                updateStatus('loading', 'Reading file...');
                setProgress(10);

                // Read file as ArrayBuffer
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);

                // Write to virtual filesystem
                const filename = 'input.step';
                oc.FS.writeFile(filename, uint8Array);
                
                setProgress(30);
                updateStatus('loading', 'Parsing STEP file...');

                // Read STEP file
                const reader = new oc.STEPControl_Reader();
                const readStatus = reader.ReadFile(filename);
                
                if (readStatus !== 1) {
                    throw new Error('Failed to read STEP file. The file may be corrupted or in an unsupported format.');
                }

                setProgress(50);
                updateStatus('loading', 'Converting geometry...');

                // Transfer shapes
                reader.TransferRoots();
                const shape = reader.OneShape();

                setProgress(70);
                updateStatus('loading', 'Generating mesh...');

                // Get quality setting
                const quality = parseFloat(selectedQuality.value);

                // Mesh the shape
                new oc.BRepMesh_IncrementalMesh(
                    shape,
                    quality,
                    false,
                    0.5,
                    false
                );

                setProgress(85);
                updateStatus('loading', 'Exporting to STL...');

                // Write STL file
                const stlWriter = new oc.StlAPI_Writer();
                const outputFilename = 'output.stl';
                stlWriter.Write(shape, outputFilename);

                // Read the STL file from virtual filesystem
                const stlData = oc.FS.readFile(outputFilename);
                stlBlob = new Blob([stlData], { type: 'model/stl' });

                // Cleanup virtual filesystem
                oc.FS.unlink(filename);
                oc.FS.unlink(outputFilename);

                setProgress(100);
                updateStatus('success', '✓ Conversion successful! Your STL file is ready.');
                downloadBtn.classList.add('active');

                setTimeout(() => hideProgress(), 500);

            } catch (error) {
                console.error('Conversion error:', error);
                updateStatus('error', `Conversion failed: ${error.message}`);
                hideProgress();
            }
        }

        function displayFileInfo(file) {
            const sizeKB = (file.size / 1024).toFixed(2);
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            const displaySize = file.size > 1024 * 1024 ? `${sizeMB} MB` : `${sizeKB} KB`;

            fileInfo.innerHTML = `
                <div class="file-info-item">
                    <span class="file-info-label">File name:</span>
                    <span class="file-info-value">${file.name}</span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">File size:</span>
                    <span class="file-info-value">${displaySize}</span>
                </div>
            `;
            fileInfo.classList.add('active');
        }

        function updateStatus(type, message) {
            status.className = 'status ' + type;
            
            if (type === 'loading') {
                status.innerHTML = '<div class="loading-text"><span class="spinner"></span>' + message + '</div>';
            } else {
                status.innerHTML = message;
            }
        }

        function setProgress(percent) {
            progressBar.classList.add('active');
            progressFill.style.width = percent + '%';
        }

        function hideProgress() {
            progressBar.classList.remove('active');
            progressFill.style.width = '0%';
        }

        // Initialize on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeConverter);
        } else {
            initializeConverter();
        }
    })();
    </script>
</body>
</html>
